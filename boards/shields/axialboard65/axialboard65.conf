# Enable BLE
CONFIG_BT=y
CONFIG_BT_PERIPHERAL=y
CONFIG_ZMK_BLE=y

# (Optional) Keep USB too
CONFIG_ZMK_USB=y

# Make the device name obvious in the BT list
CONFIG_BT_DEVICE_NAME="AxialBoard65"
CONFIG_BT_DEVICE_APPEARANCE=961

CONFIG_USB_DEVICE_STACK=y
CONFIG_USB_CDC_ACM=y
CONFIG_UART_CONSOLE=y
CONFIG_STDOUT_CONSOLE=y
CONFIG_PRINTK=y